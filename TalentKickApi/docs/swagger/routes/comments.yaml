tags:
  - name: Comments
    description: Endpoints para gestión de comentarios en publicaciones

paths:
  /comments/{feedId}:
    post:
      summary: Crea un nuevo comentario en un feed
      tags: [Comments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: feedId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        201:
          description: Comentario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
    
    get:
      summary: Lista los comentarios de un feed
      tags: [Comments]
      parameters:
        - in: path
          name: feedId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        200:
          description: Lista de comentarios

  /comments/{id}:
    put:
      summary: Actualiza un comentario
      tags: [Comments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        200:
          description: Comentario actualizado
    
    delete:
      summary: Elimina un comentario
      tags: [Comments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        204:
          description: Comentario eliminado
