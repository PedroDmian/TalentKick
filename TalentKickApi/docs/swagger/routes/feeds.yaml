tags:
  - name: Feeds
    description: Endpoints para gestión de publicaciones

paths:
  /feeds:
    post:
      summary: Crea un nuevo feed con archivos
      tags: [Feeds]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                description:
                  type: string
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        201:
          description: Feed creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feed'
    
    get:
      summary: Lista todos los feeds (paginado)
      tags: [Feeds]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
          description: Opcional. Filtra los feeds por el ID de un usuario específico.
      responses:
        200:
          description: Lista de feeds
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Feed'

  /feeds/{id}:
    get:
      summary: Obtiene un feed por ID
      tags: [Feeds]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Datos del feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feed'
        404:
          description: Feed no encontrado
    
    put:
      summary: Actualiza un feed
      tags: [Feeds]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                description:
                  type: string
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        200:
          description: Feed actualizado
    
    delete:
      summary: Elimina un feed (soft delete)
      tags: [Feeds]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        204:
          description: Feed eliminado
